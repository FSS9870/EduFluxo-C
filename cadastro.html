<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <html lang="pt-br"></html>
    <title>Cadastro</title>
</head>

<body>
    <div id="selecao-cargo">
        <h1>Selecione o cargo</h1>
        <button onclick="Selecionar_cargo('professor')">Professor</button>
        <button onclick="Selecionar_cargo('portaria')">Portaria</button>
    </div>

    <script src="script.js"></script>

    <div id="cadastro" style="display: none;">
        <h2>Cadastro de Professor</h2>
        <form action="cadastro.php" method="post">
            <input type="hidden" id="cargo" name="cargo">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome"></input>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email"></input>

            <label for="senha">Senha do tipo</label>
            <input type="password" id="senha" name="senha"></input>

            <input type="submit" value="Cadastrar">
        </form>
    </div>
    <button onclick="Login()">Já tenho uma conta</button>
    <div id="login" style="display: none;">
        <h2>Login</h2>
        <form action="login.php" method="post">
            <label for="nome">Nome:</label>
            <input type="text" id="nome_login" name="nome"></input>

            <label for="senha">Senha do tipo</label>
            <input type="password" id="senha_login" name="senha"></input>

            <input type="submit" value="Entrar">
        </form>
    </div>
</body>
